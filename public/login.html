<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LikeSlack - 로그인</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1d21">
  <link rel="icon" href="/assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1d21;
      color: #d1d2d3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-container {
      background: #222529;
      border-radius: 12px;
      padding: 48px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 28px;
      color: #fff;
      font-weight: 900;
    }
    .logo p {
      color: #8b8d91;
      margin-top: 8px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #b9bbbe;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1d21;
      border: 1px solid #3f4147;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #4A90D9;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-primary {
      background: #4A90D9;
      color: #fff;
    }
    .btn-primary:hover { background: #3a7bc8; }
    .btn-secondary {
      background: transparent;
      color: #4A90D9;
      border: 1px solid #4A90D9;
    }
    .btn-secondary:hover { background: rgba(74,144,217,0.1); }
    .toggle-form {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #8b8d91;
    }
    .toggle-form a {
      color: #4A90D9;
      cursor: pointer;
      text-decoration: none;
    }
    .toggle-form a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: #e74c3c;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>LikeSlack</h1>
      <p>로컬 네트워크 메신저</p>
    </div>

    <div id="error" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>사용자명</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="form-group" id="displayNameGroup" style="display:none">
        <label>표시 이름 (선택)</label>
        <input type="text" id="displayName" placeholder="채팅에 표시될 이름">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">로그인</button>
    </form>

    <div class="toggle-form">
      <span id="toggleText">계정이 없으신가요?</span>
      <a id="toggleLink" onclick="toggleMode()">회원가입</a>
    </div>
  </div>

  <script>
    let isRegister = false;

    function toggleMode() {
      isRegister = !isRegister;
      document.getElementById('displayNameGroup').style.display = isRegister ? 'block' : 'none';
      document.getElementById('submitBtn').textContent = isRegister ? '회원가입' : '로그인';
      document.getElementById('toggleText').textContent = isRegister ? '이미 계정이 있으신가요?' : '계정이 없으신가요?';
      document.getElementById('toggleLink').textContent = isRegister ? '로그인' : '회원가입';
      document.getElementById('error').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('displayName').value.trim();

      const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
      const body = isRegister ? { username, password, displayName } : { username, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
          return;
        }

        // Save credentials for auto-login
        localStorage.setItem('likeslack-user', username);
        localStorage.setItem('likeslack-token', btoa(username + ':' + password));
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
        errorEl.style.display = 'block';
        // Auto-retry after 3 seconds
        setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
      }
    });

    // Auto-login: silent — never shows errors to user
    (async function autoLogin() {
      // 1. Check existing session
      try {
        const r = await fetch('/api/auth/me');
        if (r.ok) { window.location.href = '/'; return; }
      } catch { /* server not reachable, just show login form */ return; }

      // 2. Try saved credentials (silent)
      const savedUser = localStorage.getItem('likeslack-user');
      const savedToken = localStorage.getItem('likeslack-token');
      if (!savedUser || !savedToken) return;

      try {
        const decoded = atob(savedToken);
        const pass = decoded.substring(savedUser.length + 1);
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: savedUser, password: pass }),
        });
        if (res.ok) { window.location.href = '/'; return; }
      } catch { /* ignore */ }

      // Credentials invalid — clear silently
      localStorage.removeItem('likeslack-user');
      localStorage.removeItem('likeslack-token');
    })();
  </script>
</body>
</html>
